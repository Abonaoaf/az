<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر تطبيقات فولتشر السحابي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4338ca; --secondary: #6366f1; --bg: #f8fafc; --white: #ffffff; --text: #1e293b; --success: #10b981; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        #adminPanel { display: none; background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; border: 2px solid var(--primary); }
        .input-group { margin-bottom: 15px; text-align: right; }
        .input-group label { display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; color: #475569; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-family: inherit; }
        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        /* تصميم كرت التطبيق */
        .app-card { background: var(--white); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .app-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .app-img { width: 80px; height: 80px; border-radius: 18px; object-fit: cover; border: 1px solid #eee; }
        .app-info h3 { margin: 0; color: var(--primary); }
        .app-code { background: #f1f5f9; padding: 4px 10px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; color: #e11d48; }
        .app-desc { font-size: 0.9rem; color: #64748b; margin-bottom: 15px; line-height: 1.6; }
        
        /* حقل الرابط للنسخ */
        .link-box { display: flex; align-items: center; background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 10px; padding: 8px; gap: 10px; }
        .link-text { flex-grow: 1; font-size: 0.85rem; color: #334155; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; direction: ltr; }
        .btn-copy { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
        
        .loading { text-align: center; padding: 20px; display: none; color: var(--primary); }
    </style>
</head>
<body>

<div id="loading" class="loading"><i class="fas fa-spinner fa-spin"></i> جاري المزامنة مع السحابة...</div>

<div class="header">
    <h1><i class="fas fa-store"></i> متجر تطبيقات فولتشر</h1>
    <p>الإدارة السحابية الموحدة (اختارها وبس)</p>
</div>

<div class="container">
    <div id="adminPanel">
        <div style="margin-bottom:15px; color:var(--primary);"><b><i class="fas fa-plus-circle"></i> إضافة تطبيق جديد</b></div>
        <div class="input-group"><label>اسم التطبيق</label><input type="text" id="appName" placeholder="مثال: تطبيق قدرات الفيفي"></div>
        <div class="input-group"><label>كود التطبيق (Downloader)</label><input type="text" id="appCode" placeholder="مثال: 12345"></div>
        <div class="input-group"><label>شرح التطبيق (اختياري)</label><textarea id="appDesc" rows="2" placeholder="اكتب وصفاً مختصراً للطلاب..."></textarea></div>
        <div class="input-group"><label>رابط التحميل</label><input type="text" id="appLink" placeholder="ضع رابط الملف هنا"></div>
        <div class="input-group"><label>صورة التطبيق (من الجهاز)</label><input type="file" id="appImg" accept="image/*" onchange="previewImage(this)"></div>
        <img id="imagePreview" style="display:none; width:70px; height:70px; margin-bottom:15px; border-radius:12px;">
        <button class="btn-save" onclick="addApp()">حفظ ونشر التطبيق</button>
    </div>

    <div id="appsGrid"></div>
</div>

<script>
    const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/.json";
    let fullData = { clients: [], apps: [] };
    let selectedImageBase64 = "";

    async function init() {
        showLoading(true);
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            fullData = data || { clients: [], apps: [] };
            if (!fullData.apps) fullData.apps = [];

            // تفعيل لوحة الإدارة إذا وجد الكود السرّي
            if (new URLSearchParams(window.location.search).get('admin') === '123') {
                document.getElementById('adminPanel').style.display = 'block';
            }
            renderApps();
        } catch (e) { console.error("Firebase Error"); }
        showLoading(false);
    }

    function renderApps() {
        const isAdmin = new URLSearchParams(window.location.search).get('admin') === '123';
        document.getElementById('appsGrid').innerHTML = fullData.apps.map((app, i) => `
            <div class="app-card">
                <div class="app-header">
                    <img src="${app.img}" class="app-img">
                    <div class="app-info">
                        <h3>${app.name}</h3>
                        <span class="app-code">كود: ${app.code}</span>
                    </div>
                </div>
                ${app.desc ? `<div class="app-desc">${app.desc}</div>` : ''}
                <div class="link-box">
                    <span class="link-text" id="url-${i}">${app.link}</span>
                    <button class="btn-copy" onclick="copyText('url-${i}')"><i class="fas fa-copy"></i> نسخ</button>
                </div>
                ${isAdmin ? `<button onclick="deleteApp(${i})" style="margin-top:15px; background:none; border:none; color:#ef4444; cursor:pointer;"><i class="fas fa-trash"></i> حذف من المتجر</button>` : ''}
            </div>
        `).join('');
    }

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => alert("تم نسخ الرابط بنجاح!"));
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { 
                selectedImageBase64 = e.target.result;
                document.getElementById('imagePreview').src = selectedImageBase64;
                document.getElementById('imagePreview').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function addApp() {
        const name = document.getElementById('appName').value;
        const code = document.getElementById('appCode').value;
        const link = document.getElementById('appLink').value;
        const desc = document.getElementById('appDesc').value;
        if (!name || !link || !selectedImageBase64 || !code) return alert("يرجى ملء الاسم، الكود، الرابط واختيار صورة!");
        
        showLoading(true);
        fullData.apps.push({ name, code, link, desc, img: selectedImageBase64 });
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
        location.reload();
    }

    async function deleteApp(i) {
        if(confirm("هل تريد حذف هذا التطبيق نهائياً؟")) {
            showLoading(true);
            fullData.apps.splice(i, 1);
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
            location.reload();
        }
    }

    function showLoading(s) { document.getElementById('loading').style.display = s ? 'block' : 'none'; }
    init();
</script>
</body>
</html>
