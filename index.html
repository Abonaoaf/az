<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر Vulture App</title>
    <style>
        :root { --primary: #ff4500; --bg: #121212; --card: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .card img { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 10px; object-fit: cover; }
        .btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; }
        #admin-panel { background: #222; padding: 20px; border-radius: 15px; margin-bottom: 30px; display: none; border: 2px dashed var(--primary); }
        input { width: 90%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #444; background: #333; color: white; }
    </style>
</head>
<body>

    <h1 style="text-align:center;">Vulture Store 🦅</h1>

    <div id="admin-panel">
        <h3>إضافة تطبيق جديد للسحابة</h3>
        <input type="text" id="appName" placeholder="اسم التطبيق">
        <input type="text" id="appCode" placeholder="كود التطبيق (مثال: V-10)">
        <input type="text" id="appUrl" placeholder="رابط التحميل">
        <input type="file" id="appIcon" accept="image/*">
        <button class="btn" onclick="uploadApp()">نشر في السحابة</button>
        <p id="status"></p>
    </div>

    <div class="grid" id="appGrid">جاري جلب التطبيقات من السحابة...</div>

    <script>
        // رابط السحابة الموجه لمجلد التطبيقات فقط
        const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/apps.json";

        // التحقق من وضع المسؤول
        if (new URLSearchParams(window.location.search).get('admin') === '123') {
            document.getElementById('admin-panel').style.display = 'block';
        }

        async function loadApps() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                const grid = document.getElementById('appGrid');
                grid.innerHTML = '';
                if (!data) { grid.innerHTML = 'لا توجد تطبيقات حالياً.'; return; }
                
                Object.values(data).forEach(app => {
                    grid.innerHTML += `
                        <div class="card">
                            <img src="${app.icon}" alt="icon">
                            <div style="font-weight:bold; margin-bottom:5px;">${app.name}</div>
                            <div style="font-size:12px; color:#aaa; margin-bottom:10px;">${app.code}</div>
                            <a href="${app.url}" class="btn">تحميل</a>
                        </div>
                    `;
                });
            } catch (e) { console.error("خطأ في الجلب", e); }
        }

        function uploadApp() {
            const name = document.getElementById('appName').value;
            const code = document.getElementById('appCode').value;
            const url = document.getElementById('appUrl').value;
            const file = document.getElementById('appIcon').files[0];

            if (!name || !file) return alert("اكمل البيانات");

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const appData = { name, code, url, icon: reader.result };
                document.getElementById('status').innerText = "جاري المزامنة...";
                
                await fetch(DB_URL, {
                    method: 'POST',
                    body: JSON.stringify(appData)
                });
                
                alert("تم الحفظ بنجاح!");
                location.reload();
            };
        }

        loadApps();
    </script>
</body>
</html>
