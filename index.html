<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر تطبيقات فولتشر السحابي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ... (نفس التنسيقات السابقة التي طلبتها) ... */
        :root { --primary: #4338ca; --secondary: #6366f1; --bg: #f8fafc; --white: #ffffff; --text: #1e293b; --danger: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container { padding: 20px; max-width: 700px; margin: auto; }
        #adminPanel { display: none; background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; border: 2px solid var(--primary); }
        .app-card { background: var(--white); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 15px; }
        .app-main { display: flex; align-items: center; gap: 15px; }
        .app-img { border-radius: 18px; object-fit: cover; background: #f1f5f9; border: 1px solid #eee; flex-shrink: 0; }
        .btn-action { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--primary); color: white; text-decoration: none; padding: 12px; border-radius: 12px; font-weight: bold; }
        .loading { text-align: center; padding: 50px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div id="loading" class="loading" style="display:none;"><i class="fas fa-spinner fa-spin"></i> جاري الاتصال بالسحابة...</div>

<div class="header">
    <h1><i class="fas fa-cubes"></i> متجر تطبيقات فولتشر</h1>
    <p>الإدارة السحابية الموحدة (اختارها وبس)</p>
</div>

<div class="container">
    <div id="adminPanel">
        <div style="color:var(--primary); margin-bottom:15px;"><b><i class="fas fa-plus-circle"></i> إضافة تطبيق للسحابة</b></div>
        <input type="text" id="appName" placeholder="اسم التطبيق" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        <input type="file" id="appImg" accept="image/*" onchange="previewImage(this)" style="margin-bottom:10px;">
        <img id="imagePreview" style="display:none; width:60px; height:60px; margin-bottom:10px; border-radius:10px;">
        <input type="text" id="appLink" placeholder="رابط التحميل" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        <button onclick="addApp()" style="width:100%; background:var(--primary); color:white; padding:15px; border:none; border-radius:10px; cursor:pointer;">حفظ ونشر سحابياً</button>
    </div>
    <div id="appsGrid"></div>
</div>

<script>
    // الرابط السحابي الخاص بك من صورك
    const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/.json";
    let fullData = { clients: [], apps: [] };
    let selectedImageBase64 = "";

    async function init() {
        document.getElementById('loading').style.display = 'block';
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            fullData = data || { clients: [], apps: [] };
            if (!fullData.apps) fullData.apps = [];

            const params = new URLSearchParams(window.location.search);
            if (params.get('admin') === '123') {
                document.getElementById('adminPanel').style.display = 'block';
            }
            renderApps();
        } catch (e) { console.error("Firebase Connection Error"); }
        document.getElementById('loading').style.display = 'none';
    }

    function renderApps() {
        const grid = document.getElementById('appsGrid');
        grid.innerHTML = fullData.apps.map((app, i) => `
            <div class="app-card">
                <div class="app-main">
                    <img src="${app.img}" class="app-img" style="width:70px; height:70px;">
                    <h3 style="margin:0">${app.name}</h3>
                </div>
                <a href="${app.link}" class="btn-action" target="_blank"><i class="fas fa-download"></i> تحميل</a>
            </div>
        `).join('');
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImageBase64 = e.target.result;
                document.getElementById('imagePreview').src = selectedImageBase64;
                document.getElementById('imagePreview').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function addApp() {
        const name = document.getElementById('appName').value;
        const link = document.getElementById('appLink').value;
        if (!name || !link || !selectedImageBase64) return alert("أكمل البيانات والصورة!");
        
        fullData.apps.push({ name, link, img: selectedImageBase64 });
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
        location.reload();
    }

    init();
</script>
</body>
</html>
