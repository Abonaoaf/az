<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر تطبيقات فولتشر السحابي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4338ca; --secondary: #6366f1; --bg: #f8fafc; --white: #ffffff; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container { padding: 20px; max-width: 700px; margin: auto; }
        #adminPanel { display: none; background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; border: 2px solid var(--primary); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #64748b; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; }
        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .app-card { background: var(--white); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 15px; border: 1px solid #e2e8f0; }
        .app-img { border-radius: 18px; object-fit: cover; border: 1px solid #eee; }
        .loading { text-align: center; padding: 20px; display: none; color: var(--primary); }
    </style>
</head>
<body>

<div id="loading" class="loading"><i class="fas fa-spinner fa-spin"></i> جاري المزامنة...</div>

<div class="header">
    <h1><i class="fas fa-cubes"></i> متجر تطبيقات فولتشر</h1>
    <p>الإدارة السحابية الموحدة (اختارها وبس)</p>
</div>

<div class="container">
    <div id="adminPanel">
        <div style="margin-bottom:15px; color:var(--primary);"><b><i class="fas fa-plus-circle"></i> إضافة تطبيق للسحابة</b></div>
        <div class="input-group"><label>اسم التطبيق</label><input type="text" id="appName"></div>
        <div class="input-group"><label>أيقونة التطبيق (من الاستوديو)</label><input type="file" id="appImg" accept="image/*" onchange="previewImage(this)"></div>
        <img id="imagePreview" style="display:none; width:60px; height:60px; margin-bottom:15px; border-radius:10px;">
        <div class="input-group"><label>رابط التحميل المباشر</label><input type="text" id="appLink"></div>
        <button class="btn-save" onclick="addApp()">حفظ ونشر التطبيق</button>
    </div>
    <div id="appsGrid"></div>
</div>

<script>
    // الرابط السحابي الخاص بك
    const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/.json";
    let fullData = { clients: [], apps: [] };
    let selectedImageBase64 = "";

    async function init() {
        showLoading(true);
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            fullData = data || { clients: [], apps: [] };
            if (!fullData.apps) fullData.apps = [];

            if (new URLSearchParams(window.location.search).get('admin') === '123') {
                document.getElementById('adminPanel').style.display = 'block';
            }
            renderApps();
        } catch (e) { console.error("Firebase Connection Error"); }
        showLoading(false);
    }

    function renderApps() {
        document.getElementById('appsGrid').innerHTML = fullData.apps.map((app, i) => `
            <div class="app-card">
                <img src="${app.img}" class="app-img" style="width:70px; height:70px;">
                <div style="flex-grow:1;">
                    <h3 style="margin:0">${app.name}</h3>
                    <a href="${app.link}" target="_blank" style="color:var(--primary); text-decoration:none; font-weight:bold;">تحميل التطبيق APK</a>
                </div>
                <button onclick="deleteApp(${i})" style="display:${new URLSearchParams(window.location.search).get('admin') === '123' ? 'block' : 'none'}; background:none; border:none; color:red; cursor:pointer;"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { 
                selectedImageBase64 = e.target.result;
                document.getElementById('imagePreview').src = selectedImageBase64;
                document.getElementById('imagePreview').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function addApp() {
        const name = document.getElementById('appName').value;
        const link = document.getElementById('appLink').value;
        if (!name || !link || !selectedImageBase64) return alert("أكمل البيانات!");
        
        showLoading(true);
        fullData.apps.push({ name, link, img: selectedImageBase64 });
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
        location.reload();
    }

    async function deleteApp(i) {
        if(confirm("حذف التطبيق؟")) {
            showLoading(true);
            fullData.apps.splice(i, 1);
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
            location.reload();
        }
    }

    function showLoading(s) { document.getElementById('loading').style.display = s ? 'block' : 'none'; }
    init();
</script>
</body>
</html>
