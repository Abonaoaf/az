<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر تطبيقات فولتشر السحابي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4338ca; --secondary: #6366f1; --bg: #f8fafc; --white: #ffffff; --text: #1e293b; --success: #10b981; --danger: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        #adminPanel { display: none; background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px; border: 2px solid var(--primary); }
        .input-group { margin-bottom: 15px; text-align: right; }
        .input-group label { display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; color: #475569; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-family: inherit; }
        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .app-card { background: var(--white); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .app-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .app-img { width: 70px; height: 70px; border-radius: 15px; object-fit: cover; border: 1px solid #eee; }
        .app-info h3 { margin: 0; color: var(--primary); font-size: 1.1rem; }
        .app-code { background: #fff1f2; padding: 4px 10px; border-radius: 8px; font-weight: bold; font-size: 0.85rem; color: #e11d48; display: inline-block; margin-top: 5px; }
        .app-desc { font-size: 0.9rem; color: #64748b; margin-bottom: 15px; line-height: 1.6; }
        .link-box { display: flex; align-items: center; background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 10px; padding: 8px; gap: 10px; }
        .link-text { flex-grow: 1; font-size: 0.8rem; color: #334155; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; direction: ltr; }
        .btn-copy { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .loading { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

<div id="loading" class="loading">
    <i class="fas fa-spinner fa-spin fa-3x" style="color:var(--primary)"></i>
    <span style="font-weight:bold; color:var(--primary)">جاري المزامنة السحابية...</span>
</div>

<div class="header">
    <h1><i class="fas fa-store"></i> متجر تطبيقات فولتشر</h1>
    <p>الإدارة السحابية الموحدة (اختارها وبس)</p>
</div>

<div class="container">
    <div id="adminPanel">
        <div style="margin-bottom:15px; color:var(--primary); border-bottom:1px solid #eee; padding-bottom:10px;">
            <b><i class="fas fa-plus-circle"></i> إضافة تطبيق جديد للمتجر</b>
        </div>
        <div class="input-group"><label>اسم التطبيق</label><input type="text" id="appName"></div>
        <div class="input-group"><label>كود التطبيق (Downloader)</label><input type="text" id="appCode"></div>
        <div class="input-group"><label>شرح التطبيق (اختياري)</label><textarea id="appDesc" rows="2"></textarea></div>
        <div class="input-group"><label>رابط التحميل المباشر</label><input type="text" id="appLink"></div>
        <div class="input-group"><label>صورة التطبيق (من الجهاز)</label><input type="file" id="appImg" accept="image/*" onchange="previewImage(this)"></div>
        <center><img id="imagePreview" style="display:none; width:60px; height:60px; margin-bottom:15px; border-radius:12px;"></center>
        <button class="btn-save" onclick="addApp()">حفظ ونشر التطبيق</button>
    </div>
    <div id="appsGrid"></div>
</div>

<script>
    const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/.json";
    const ADMIN_KEY = "AboNawaf_Safe_Store_2026"; // كلمة السر الجديدة هنا
    let fullData = { clients: [], apps: [] };
    let selectedImageBase64 = "";

    async function init() {
        showLoading(true);
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if (data) {
                fullData.clients = data.clients || [];
                fullData.apps = data.apps || [];
            }
            if (new URLSearchParams(window.location.search).get('admin') === ADMIN_KEY) {
                document.getElementById('adminPanel').style.display = 'block';
            }
            renderApps();
        } catch (e) { alert("خطأ في الاتصال!"); }
        showLoading(false);
    }

    function renderApps() {
        const isAdmin = new URLSearchParams(window.location.search).get('admin') === ADMIN_KEY;
        const grid = document.getElementById('appsGrid');
        grid.innerHTML = fullData.apps.map((app, i) => `
            <div class="app-card">
                <div class="app-header"><img src="${app.img}" class="app-img"><div class="app-info"><h3>${app.name}</h3><span class="app-code">كود: ${app.code}</span></div></div>
                ${app.desc ? `<div class="app-desc">${app.desc}</div>` : ''}
                <div class="link-box"><span class="link-text" id="url-${i}">${app.link}</span><button class="btn-copy" onclick="copyText('url-${i}')">نسخ</button></div>
                ${isAdmin ? `<button onclick="deleteApp(${i})" style="margin-top:15px; background:none; border:none; color:var(--danger); cursor:pointer;">حذف</button>` : ''}
            </div>
        `).join('');
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { 
                selectedImageBase64 = e.target.result;
                document.getElementById('imagePreview').src = selectedImageBase64;
                document.getElementById('imagePreview').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function addApp() {
        showLoading(true);
        const res = await fetch(DB_URL);
        const latestData = await res.json();
        if (latestData) {
            fullData.clients = latestData.clients || [];
            fullData.apps = latestData.apps || [];
        }
        fullData.apps.push({
            name: document.getElementById('appName').value,
            code: document.getElementById('appCode').value,
            link: document.getElementById('appLink').value,
            desc: document.getElementById('appDesc').value,
            img: selectedImageBase64
        });
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
        location.reload();
    }

    async function deleteApp(i) {
        if(confirm("حذف التطبيق؟")) {
            showLoading(true);
            fullData.apps.splice(i, 1);
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
            location.reload();
        }
    }

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => alert("تم النسخ!"));
    }

    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
    init();
</script>
</body>
</html>
